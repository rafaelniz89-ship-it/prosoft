<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ProSoft</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .software-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .software-card {
      background: var(--surface2);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .software-card h3 {
      margin-bottom: 16px;
      color: var(--accent);
    }
    .software-card p {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 14px;
    }
    .software-card .btn {
      width: 100%;
    }
    .logout-admin {
      background: var(--accent);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">📊</div>
      <div>
        <h1>ProSoft</h1>
        <div class="subtitle">Software Platform</div>
      </div>
      <button class="btn logout-admin" onclick="logout()" style="margin-left: auto;">Logout</button>
    </header>

    <div class="dashboard-header">
      <h2>Welcome, <span id="username">...</span></h2>
      <div class="runs-display">
        <div class="runs-number" id="runsRemaining">--</div>
        <div>
          <div class="runs-label">Runs Remaining</div>
          <div class="runs-label" id="runsTotal" style="color: var(--muted); font-size: 12px;"></div>
        </div>
      </div>
    </div>

    <h3 style="margin-bottom: 20px;">Available Software</h3>
    <div class="software-grid">
      <!-- Bank File Builder -->
      <div class="software-card">
        <h3>🏦 Bank File Builder</h3>
        <p>Generate bank reconciliation files quickly and accurately.</p>
        <button class="btn" onclick="openSoftware('Bank_File_Builder.html', 'Bank File Builder')">
          Open Software
        </button>
      </div>
      
      <!-- Insurance Reconciliation -->
      <div class="software-card">
        <h3>📋 Insurance Reconciliation</h3>
        <p>Reconcile insurance claims and payments with ease.</p>
        <button class="btn" onclick="openSoftware('Insurance_Reconciliation.html', 'Insurance Reconciliation')">
          Open Software
        </button>
      </div>
    </div>
  </div>

  <!-- Software Modal -->
  <div class="modal" id="softwareModal">
    <div class="modal-content" style="max-width: 1200px; width: 95%; height: 90vh;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modalTitle">Software</h2>
        <button onclick="closeSoftware()" style="background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer;">&times;</button>
      </div>
      <iframe id="softwareFrame" src="" style="width: 100%; height: calc(100% - 60px); border: none; border-radius: 12px; background: white;"></iframe>
    </div>
  </div>

  <script>
    let currentUser = null;
    
    async function loadUser() {
      const res = await fetch('/api/user');
      const data = await res.json();
      
      if (!data.loggedIn) {
        window.location.href = '/login.html';
        return;
      }
      
      currentUser = data;
      document.getElementById('username').textContent = data.username;
    }
    
    async function loadRuns() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      
      // Find current user's stats
      const usersRes = await fetch('/api/users');
      const users = await usersRes.json();
      const user = users.find(u => u.username === currentUser?.username);
      
      if (user) {
        document.getElementById('runsRemaining').textContent = user.runs_remaining;
        document.getElementById('runsTotal').textContent = `of ${user.runs_total} total`;
      }
    }
    
    function openSoftware(file, title) {
      // Check runs
      const runs = parseInt(document.getElementById('runsRemaining').textContent);
      if (runs <= 0) {
        alert('No runs remaining! Please contact the administrator.');
        return;
      }
      
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('softwareFrame').src = '/software/' + file;
      document.getElementById('softwareModal').classList.add('active');
    }
    
    function closeSoftware() {
      document.getElementById('softwareModal').classList.remove('active');
      document.getElementById('softwareFrame').src = '';
      // Reload runs after using one
      loadRuns();
    }
    
    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }
    
    loadUser().then(() => loadRuns());
  </script>
</body>
</html>
