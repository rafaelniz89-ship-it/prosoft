<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ProSoft</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .admin-card {
      background: var(--surface2);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    .admin-card h3 {
      margin-bottom: 16px;
      color: var(--accent);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 100px auto;
      gap: 12px;
      align-items: end;
    }
    .form-grid input {
      width: 100%;
    }
    .stat-big {
      font-size: 48px;
      font-weight: bold;
      color: var(--accent);
    }
    .user-actions {
      display: flex;
      gap: 8px;
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    .btn-danger {
      background: var(--red);
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn-edit {
      background: var(--blue);
    }
    .btn-runs {
      background: var(--green);
    }
    .logout-admin {
      background: var(--accent);
      color: var(--bg);
    }
    table { width: 100%; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--accent); font-weight: 600; }
    .text-red { color: var(--red); }
    .text-green { color: var(--green); }
    .text-orange { color: var(--orange); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚙️</div>
      <div>
        <h1>Admin Panel</h1>
        <div class="subtitle">ProSoft Management</div>
      </div>
      <div style="display: flex; gap: 12px; margin-left: auto;">
        <button class="btn" onclick="window.location.href='/dashboard.html'" style="background: var(--blue);">👤 Customer View</button>
        <button class="btn logout-admin" onclick="logout()">Logout</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="admin-grid">
      <div class="admin-card">
        <h3>📊 Total Users</h3>
        <div class="stat-big" id="statUsers">--</div>
      </div>
      <div class="admin-card">
        <h3>⚡ Total Runs Used</h3>
        <div class="stat-big" id="statRunsUsed">--</div>
      </div>
      <div class="admin-card">
        <h3>🎯 Runs Remaining</h3>
        <div class="stat-big" id="statRunsRemaining">--</div>
      </div>
      <div class="admin-card">
        <h3>👥 Active Users</h3>
        <div class="stat-big" id="statActive">--</div>
      </div>
    </div>

    <!-- Add User -->
    <div class="admin-card" style="margin-bottom: 24px;">
      <h3>➕ Add New User</h3>
      <form id="addUserForm" class="form-grid">
        <div>
          <label style="display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted);">Username</label>
          <input type="text" name="username" placeholder="Username" required>
        </div>
        <div>
          <label style="display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted);">Password</label>
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <div>
          <label style="display: block; margin-bottom: 4px; font-size: 12px; color: var(--muted);">Runs</label>
          <input type="number" name="runs" value="20" min="0" required>
        </div>
        <button type="submit" class="btn" style="width: auto;">Add User</button>
      </form>
      <div id="addStatus" style="margin-top: 12px;"></div>
    </div>

    <!-- User Management -->
    <div class="admin-card">
      <h3>👥 User Management</h3>
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Runs Total</th>
            <th>Runs Used</th>
            <th>Runs Left</th>
            <th>Last Login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Upload Software -->
    <div class="admin-card" style="margin-top: 24px;">
      <h3>📤 Upload Software</h3>
      <form id="uploadForm" style="display: flex; gap: 12px; align-items: end;">
        <div style="flex: 1;">
          <input type="file" name="file" accept=".html" required style="width: 100%;">
        </div>
        <button type="submit" class="btn" style="width: auto; padding: 12px 24px;">Upload</button>
      </form>
      <div id="uploadStatus" style="margin-top: 12px;"></div>
    </div>
  </div>

  <!-- Edit Runs Modal -->
  <div class="modal" id="editRunsModal">
    <div class="modal-content">
      <h2>Edit User Runs</h2>
      <form id="editRunsForm">
        <input type="hidden" id="editUserId">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="editUsername" disabled>
        </div>
        <div class="form-group">
          <label>New Runs Remaining</label>
          <input type="number" id="editRunsInput" min="0" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function checkAdmin() {
      const res = await fetch('/api/user');
      const data = await res.json();
      
      if (!data.loggedIn || !data.is_admin) {
        window.location.href = '/login.html';
        return;
      }
      
      loadStats();
      loadUsers();
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      
      document.getElementById('statUsers').textContent = stats.total_users || 0;
      document.getElementById('statRunsUsed').textContent = stats.total_runs_used || 0;
      document.getElementById('statRunsRemaining').textContent = stats.total_runs_remaining || 0;
      document.getElementById('statActive').textContent = stats.total_users || 0;
    }

    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();
      
      const tbody = document.getElementById('usersTable');
      
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No users yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = users.map(u => {
        const runsClass = u.runs_remaining === 0 ? 'text-red' : u.runs_remaining <= 5 ? 'text-orange' : 'text-green';
        const adminBadge = u.is_admin ? '<span style="color: var(--accent); font-size: 12px;">(Admin)</span>' : '';
        return '<tr>' +
          '<td>' + u.username + ' ' + adminBadge + '</td>' +
          '<td>' + u.runs_total + '</td>' +
          '<td>' + (u.runs_total - u.runs_remaining) + '</td>' +
          '<td class="' + runsClass + '">' + u.runs_remaining + '</td>' +
          '<td>' + (u.last_login ? new Date(u.last_login).toLocaleDateString() : 'Never') + '</td>' +
          '<td class="user-actions">' +
            '<button class="btn btn-runs btn-sm" onclick="editRuns(' + u.id + ', \'' + u.username + '\', ' + u.runs_remaining + ')">✏️ Edit Runs</button>' +
            '<button class="btn btn-danger btn-sm" onclick="deleteUser(' + u.id + ', \'' + u.username + '\')">🗑️ Delete</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    // Add user form
    document.getElementById('addUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      const statusEl = document.getElementById('addStatus');
      
      statusEl.textContent = 'Adding...';
      statusEl.style.color = 'var(--muted)';
      
      try {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          statusEl.textContent = '✓ User added successfully!';
          statusEl.style.color = 'var(--green)';
          e.target.reset();
          e.target.querySelector('input[name="runs"]').value = 20;
          loadUsers();
          loadStats();
        } else {
          const err = await res.json();
          statusEl.textContent = '✗ ' + (err.error || 'Failed to add user');
          statusEl.style.color = 'var(--red)';
        }
      } catch (err) {
        statusEl.textContent = '✗ Connection error';
        statusEl.style.color = 'var(--red)';
      }
    });

    // Upload software
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const statusEl = document.getElementById('uploadStatus');
      
      statusEl.textContent = 'Uploading...';
      statusEl.style.color = 'var(--muted)';
      
      try {
        const res = await fetch('/api/upload-software', {
          method: 'POST',
          body: formData
        });
        
        if (res.ok) {
          const data = await res.json();
          statusEl.textContent = '✓ Uploaded: ' + data.filename;
          statusEl.style.color = 'var(--green)';
          e.target.reset();
        } else {
          const err = await res.json();
          statusEl.textContent = '✗ ' + (err.error || 'Upload failed');
          statusEl.style.color = 'var(--red)';
        }
      } catch (err) {
        statusEl.textContent = '✗ Connection error';
        statusEl.style.color = 'var(--red)';
      }
    });

    function editRuns(id, username, currentRuns) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editUsername').value = username;
      document.getElementById('editRunsInput').value = currentRuns;
      document.getElementById('editRunsModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editRunsModal').classList.remove('active');
    }

    document.getElementById('editRunsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editUserId').value;
      const runs = document.getElementById('editRunsInput').value;
      
      const res = await fetch('/api/users/' + id + '/runs', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ runs: parseInt(runs) })
      });
      
      if (res.ok) {
        closeEditModal();
        loadUsers();
        loadStats();
      } else {
        alert('Failed to update runs');
      }
    });

    async function deleteUser(id, username) {
      if (!confirm('Are you sure you want to delete user "' + username + '"?')) return;
      
      const res = await fetch('/api/users/' + id, { method: 'DELETE' });
      if (res.ok) {
        loadUsers();
        loadStats();
      } else {
        alert('Failed to delete user');
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }

    checkAdmin();
  </script>
</body>
</html>
