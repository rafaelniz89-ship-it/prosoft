<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ProSoft</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚙️</div>
      <div>
        <h1>Admin Panel</h1>
        <div class="subtitle">ProSoft Management</div>
      </div>
      <a href="/dashboard.html" style="color: var(--accent); text-decoration: none; margin-left: auto;">← Back to Dashboard</a>
    </header>

    <!-- Stats -->
    <div class="admin-section">
      <h3>Platform Statistics</h3>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="value" id="statUsers">--</div>
          <div class="label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statRunsUsed">--</div>
          <div class="label">Runs Used</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statRunsRemaining">--</div>
          <div class="label">Runs Remaining</div>
        </div>
      </div>
    </div>

    <!-- Upload Software -->
    <div class="admin-section">
      <h3>Upload / Update Software</h3>
      <form id="uploadForm" enctype="multipart/form-data">
        <div style="display: flex; gap: 12px; align-items: center;">
          <input type="file" name="file" accept=".html" required style="flex: 1;">
          <button type="submit" class="btn" style="width: auto; padding: 12px 24px;">Upload</button>
        </div>
      </form>
      <div id="uploadStatus" style="margin-top: 12px;"></div>
    </div>

    <!-- User Management -->
    <div class="admin-section">
      <h3>User Management</h3>
      
      <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
        <form id="addUserForm" style="display: flex; gap: 8px; flex: 1;">
          <input type="text" name="username" placeholder="Username" required style="flex: 1;">
          <input type="password" name="password" placeholder="Password" required>
          <input type="number" name="runs" placeholder="Runs" value="20" required style="width: 100px;">
          <button type="submit" class="btn" style="width: auto; padding: 12px 20px;">Add User</button>
        </form>
      </div>

      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Runs Total</th>
            <th>Runs Used</th>
            <th>Runs Left</th>
            <th>Last Login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit Runs Modal -->
  <div class="modal" id="editRunsModal">
    <div class="modal-content">
      <h2>Edit User Runs</h2>
      <form id="editRunsForm">
        <input type="hidden" id="editUserId">
        <div class="form-group">
          <label>New Runs Remaining</label>
          <input type="number" id="editRunsInput" min="0" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function checkAdmin() {
      const res = await fetch('/api/user');
      const data = await res.json();
      
      if (!data.loggedIn || !data.is_admin) {
        window.location.href = '/dashboard.html';
        return;
      }
      
      loadStats();
      loadUsers();
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      
      document.getElementById('statUsers').textContent = stats.total_users || 0;
      document.getElementById('statRunsUsed').textContent = stats.total_runs_used || 0;
      document.getElementById('statRunsRemaining').textContent = stats.total_runs_remaining || 0;
    }

    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();
      
      const tbody = document.getElementById('usersTable');
      
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No users yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = users.map(u => \`
        <tr>
          <td>\${u.username} \${u.is_admin ? '<span style="color: var(--accent); font-size: 12px;">(Admin)</span>' : ''}</td>
          <td>\${u.runs_total}</td>
          <td>\${u.runs_total - u.runs_remaining}</td>
          <td class="\${u.runs_remaining === 0 ? 'text-red' : u.runs_remaining <= 5 ? 'text-orange' : 'text-green'}">\${u.runs_remaining}</td>
          <td>\${u.last_login ? new Date(u.last_login).toLocaleDateString() : 'Never'}</td>
          <td class="actions">
            \${!u.is_admin ? \`
              <button class="edit-btn" onclick="editRuns(\${u.id}, \${u.runs_remaining})">Edit Runs</button>
              <button class="add-runs-btn" onclick="addRuns(\${u.id})">+5 Runs</button>
              <button class="delete-btn" onclick="deleteUser(\${u.id})">Delete</button>
            \` : ''}
          </td>
        </tr>
      \`).join('');
    }

    // Add user form
    document.getElementById('addUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      
      try {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (res.ok) {
          e.target.reset();
          loadUsers();
          loadStats();
        } else {
          const err = await res.json();
          alert(err.error || 'Failed to add user');
        }
      } catch (err) {
        alert('Error adding user');
      }
    });

    // Upload software
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const statusEl = document.getElementById('uploadStatus');
      
      statusEl.textContent = 'Uploading...';
      statusEl.style.color = 'var(--muted)';
      
      try {
        const res = await fetch('/api/upload-software', {
          method: 'POST',
          body: formData
        });
        
        if (res.ok) {
          const data = await res.json();
          statusEl.textContent = '✓ Uploaded: ' + data.filename;
          statusEl.style.color = 'var(--green)';
          e.target.reset();
        } else {
          const err = await res.json();
          statusEl.textContent = '✗ ' + (err.error || 'Upload failed');
          statusEl.style.color = 'var(--red)';
        }
      } catch (err) {
        statusEl.textContent = '✗ Connection error';
        statusEl.style.color = 'var(--red)';
      }
    });

    function editRuns(id, currentRuns) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editRunsInput').value = currentRuns;
      document.getElementById('editRunsModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editRunsModal').classList.remove('active');
    }

    document.getElementById('editRunsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editUserId').value;
      const runs = document.getElementById('editRunsInput').value;
      
      const res = await fetch('/api/users/' + id + '/runs', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ runs: parseInt(runs) })
      });
      
      if (res.ok) {
        closeEditModal();
        loadUsers();
        loadStats();
      } else {
        alert('Failed to update runs');
      }
    });

    async function addRuns(id) {
      const res = await fetch('/api/users/' + id + '/runs', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ runs_extra: 5 })
      });
      
      // Get current runs from table and add 5
      loadUsers();
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      
      const res = await fetch('/api/users/' + id, { method: 'DELETE' });
      if (res.ok) {
        loadUsers();
        loadStats();
      } else {
        alert('Failed to delete user');
      }
    }

    checkAdmin();
  </script>
</body>
</html>
